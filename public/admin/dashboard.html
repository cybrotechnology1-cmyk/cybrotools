<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybro Admin - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 font-sans antialiased">
  <div id="admin-layout-container" class="flex flex-col md:flex-row min-h-screen">
    <!-- Sidebar and top menu will be dynamically injected here -->
  </div>

  <script type="module">
    import { renderSidebar, adminFetch, showToast } from "./admin.js";

    // Initialize layout sidebar
    renderSidebar("dashboard");

    // Load dynamic page contents
    const mainStage = document.getElementById("admin-main-stage");
    
    // Set initial skeleton loaders or title header
    mainStage.innerHTML = `
      <div class="space-y-8 animate-pulse">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          ${[1, 2, 3, 4].map(() => `
            <div class="h-32 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6"></div>
          `).join("")}
        </div>
        <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 h-96"></div>
      </div>
    `;

    try {
      const res = await adminFetch("/api/admin/analytics");
      const data = await res.json();
      
      const { stats, logs } = data;

      mainStage.innerHTML = `
        <div class="space-y-8 animate-in fade-in duration-300">
          <!-- Statistics Grids -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Blogs Card -->
            <a href="posts.html" class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 hover:border-gray-300 dark:hover:border-zinc-700 hover:shadow-sm transition-all rounded-3xl p-6 flex items-center justify-between group">
              <div class="space-y-2">
                <p class="text-sm font-semibold text-gray-500 dark:text-zinc-400">Blog Posts</p>
                <p class="text-3xl font-extrabold tracking-tight">${stats.totalPosts}</p>
              </div>
              <div class="w-12 h-12 rounded-2xl bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 flex items-center justify-center group-hover:scale-105 transition-transform">
                <i data-lucide="book-open" class="w-6 h-6"></i>
              </div>
            </a>

            <!-- Categories Card -->
            <a href="categories.html" class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 hover:border-gray-300 dark:hover:border-zinc-700 hover:shadow-sm transition-all rounded-3xl p-6 flex items-center justify-between group">
              <div class="space-y-2">
                <p class="text-sm font-semibold text-gray-500 dark:text-zinc-400">Categories</p>
                <p class="text-3xl font-extrabold tracking-tight">${stats.totalCategories}</p>
              </div>
              <div class="w-12 h-12 rounded-2xl bg-amber-50 dark:bg-amber-950/40 text-amber-600 dark:text-amber-400 flex items-center justify-center group-hover:scale-105 transition-transform">
                <i data-lucide="tags" class="w-6 h-6"></i>
              </div>
            </a>

            <!-- Media Card -->
            <a href="media.html" class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 hover:border-gray-300 dark:hover:border-zinc-700 hover:shadow-sm transition-all rounded-3xl p-6 flex items-center justify-between group">
              <div class="space-y-2">
                <p class="text-sm font-semibold text-gray-500 dark:text-zinc-400">Media Library</p>
                <p class="text-3xl font-extrabold tracking-tight">${stats.totalMedia}</p>
              </div>
              <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 flex items-center justify-center group-hover:scale-105 transition-transform">
                <i data-lucide="image" class="w-6 h-6"></i>
              </div>
            </a>

            <!-- Homepage Tools Card -->
            <a href="tools.html" class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 hover:border-gray-300 dark:hover:border-zinc-700 hover:shadow-sm transition-all rounded-3xl p-6 flex items-center justify-between group">
              <div class="space-y-2">
                <p class="text-sm font-semibold text-gray-500 dark:text-zinc-400">Active Nodes</p>
                <p class="text-3xl font-extrabold tracking-tight">${stats.activeTools} <span class="text-xs font-semibold text-gray-400">/ ${stats.totalTools}</span></p>
              </div>
              <div class="w-12 h-12 rounded-2xl bg-purple-50 dark:bg-purple-950/40 text-purple-600 dark:text-purple-400 flex items-center justify-center group-hover:scale-105 transition-transform">
                <i data-lucide="sliders" class="w-6 h-6"></i>
              </div>
            </a>
          </div>

          <!-- Quick Actions & Audit Logs -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Audit Logs List (2/3 width) -->
            <div class="lg:col-span-2 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 flex flex-col h-[500px]">
              <div class="flex items-center justify-between mb-4 flex-shrink-0">
                <div class="flex items-center gap-2">
                  <i data-lucide="activity" class="w-5 h-5 text-gray-500"></i>
                  <h3 class="font-bold text-gray-900 dark:text-white">Admin Activity Logs</h3>
                </div>
                <span class="px-2.5 py-0.5 bg-blue-50 dark:bg-zinc-800 text-blue-600 dark:text-zinc-400 rounded-full text-xs font-semibold">
                  Real-time Node Telemetry
                </span>
              </div>

              <div class="flex-1 overflow-y-auto space-y-3.5 pr-2">
                ${logs.length === 0 ? `
                  <div class="h-full flex items-center justify-center text-gray-400 text-sm">
                    No activity recorded yet.
                  </div>
                ` : logs.map(log => {
                  let badgeColor = "bg-gray-100 text-gray-700 dark:bg-zinc-800 dark:text-zinc-400";
                  if (log.action.includes("Create") || log.action.includes("Success")) badgeColor = "bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900/30";
                  if (log.action.includes("Update")) badgeColor = "bg-amber-50 dark:bg-amber-950/30 text-amber-700 dark:text-amber-400 border border-amber-100 dark:border-amber-900/30";
                  if (log.action.includes("Delete") || log.action.includes("Failed")) badgeColor = "bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400 border border-red-100 dark:border-red-900/30";

                  return `
                    <div class="p-4 bg-gray-50 dark:bg-zinc-950 border border-gray-100 dark:border-zinc-800/80 rounded-2xl space-y-2 transition-all">
                      <div class="flex flex-wrap items-center justify-between gap-2">
                        <span class="px-2 py-0.5 text-[11px] font-bold uppercase tracking-wider rounded-lg ${badgeColor}">
                          ${log.action}
                        </span>
                        <span class="text-[10px] text-gray-400 dark:text-zinc-500 font-mono">
                          ${new Date(log.timestamp).toLocaleString()}
                        </span>
                      </div>
                      <p class="text-sm text-gray-600 dark:text-zinc-300 leading-relaxed font-sans">
                        ${log.details}
                      </p>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>

            <!-- Quick Links / Shortcuts -->
            <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 flex flex-col h-[500px]">
              <div class="flex items-center gap-2 mb-6 flex-shrink-0">
                <i data-lucide="zap" class="w-5 h-5 text-amber-500"></i>
                <h3 class="font-bold text-gray-900 dark:text-white">Quick Tasks</h3>
              </div>

              <div class="space-y-3.5 flex-1 overflow-y-auto">
                <a href="posts.html?new=true" class="flex items-center gap-3.5 p-4 bg-gray-50 dark:bg-zinc-950 border border-gray-100 dark:border-zinc-850 hover:border-blue-500/30 rounded-2xl group transition-all">
                  <div class="w-10 h-10 bg-blue-100 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 class="font-semibold text-sm text-gray-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">Write Blog Post</h4>
                    <p class="text-xs text-gray-400">Compose a new knowledge article</p>
                  </div>
                </a>

                <a href="media.html" class="flex items-center gap-3.5 p-4 bg-gray-50 dark:bg-zinc-950 border border-gray-100 dark:border-zinc-850 hover:border-emerald-500/30 rounded-2xl group transition-all">
                  <div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 class="font-semibold text-sm text-gray-900 dark:text-white group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">Upload Asset</h4>
                    <p class="text-xs text-gray-400">Add files to media library</p>
                  </div>
                </a>

                <a href="seo.html" class="flex items-center gap-3.5 p-4 bg-gray-50 dark:bg-zinc-950 border border-gray-100 dark:border-zinc-850 hover:border-purple-500/30 rounded-2xl group transition-all">
                  <div class="w-10 h-10 bg-purple-100 dark:bg-purple-950/40 text-purple-600 dark:text-purple-400 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="globe" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 class="font-semibold text-sm text-gray-900 dark:text-white group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors">Audit SEO</h4>
                    <p class="text-xs text-gray-400">Rebuild sitemap and robot directives</p>
                  </div>
                </a>

                <a href="settings.html" class="flex items-center gap-3.5 p-4 bg-gray-50 dark:bg-zinc-950 border border-gray-100 dark:border-zinc-850 hover:border-gray-500/30 rounded-2xl group transition-all">
                  <div class="w-10 h-10 bg-gray-100 dark:bg-zinc-800 text-gray-600 dark:text-zinc-400 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <h4 class="font-semibold text-sm text-gray-900 dark:text-white group-hover:text-gray-900 dark:group-hover:text-white transition-colors">General Settings</h4>
                    <p class="text-xs text-gray-400">Branding, metadata, footers</p>
                  </div>
                </a>
              </div>
            </div>
          </div>
        </div>
      `;

      // Re-create icons inside stage
      lucide.createIcons();

    } catch (err) {
      console.error(err);
      showToast("Failed to fetch analytics metrics.", "error");
      mainStage.innerHTML = `
        <div class="p-6 bg-red-950/40 border border-red-900/50 rounded-2xl text-red-400 flex items-center gap-3">
          <i data-lucide="alert-octagon" class="w-6 h-6 flex-shrink-0"></i>
          <div>
            <h4 class="font-bold">Failed to load Dashboard telemetry</h4>
            <p class="text-xs mt-1">Make sure you are authenticated and have administrative privilege.</p>
          </div>
        </div>
      `;
      lucide.createIcons();
    }
  </script>
</body>
</html>
