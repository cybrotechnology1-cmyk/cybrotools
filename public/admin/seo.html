<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybro Admin - SEO Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 font-sans antialiased">
  <div id="admin-layout-container" class="flex flex-col md:flex-row min-h-screen">
    <!-- Sidebar dynamically injected here -->
  </div>

  <script type="module">
    import { renderSidebar, adminFetch, showToast } from "./admin.js";

    renderSidebar("seo");

    const mainStage = document.getElementById("admin-main-stage");
    let seoSettings = null;

    async function loadSeo() {
      mainStage.innerHTML = `<div class="h-96 flex items-center justify-center text-gray-400 animate-pulse text-sm">Querying metadata registries...</div>`;
      try {
        const res = await adminFetch("/api/admin/seo");
        seoSettings = await res.json();
        renderLayout();
      } catch (err) {
        showToast("Failed to fetch SEO settings.", "error");
        mainStage.innerHTML = `<div class="p-6 bg-red-950/40 text-red-400 rounded-2xl">Could not retrieve SEO profile. Ensure session authorization.</div>`;
      }
    }

    function renderLayout() {
      mainStage.innerHTML = `
        <div class="space-y-8 animate-in fade-in duration-300">
          <div>
            <h2 class="text-xl font-bold tracking-tight">SEO & Search Engine Directives</h2>
            <p class="text-xs text-gray-500 dark:text-zinc-400 mt-1">Configure site metadata, crawler guidelines, and automated XML index mappings.</p>
          </div>

          <form id="seo-form" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <!-- Left Column: Meta Tags (2/3 width) -->
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 space-y-5">
                  <div class="flex items-center gap-2 pb-2 border-b border-gray-50 dark:border-zinc-800/60">
                    <i data-lucide="tags" class="w-5 h-5 text-blue-500"></i>
                    <h3 class="font-bold text-sm">Global Header Meta Tags</h3>
                  </div>

                  <div class="space-y-1.5">
                    <label for="meta-title" class="text-xs font-bold uppercase text-gray-400">Default Meta Title</label>
                    <input 
                      type="text" 
                      id="meta-title" 
                      required
                      class="w-full bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-blue-500"
                      placeholder="e.g., Cybro Tools - Fast Browser Utilities"
                    >
                    <p class="text-[10px] text-gray-400">Keep titles under 60 characters for optimum previewing on Google search results.</p>
                  </div>

                  <div class="space-y-1.5">
                    <label for="meta-description" class="text-xs font-bold uppercase text-gray-400">Meta Description</label>
                    <textarea 
                      id="meta-description" 
                      required
                      rows="4"
                      class="w-full bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-blue-500 resize-none"
                      placeholder="e.g., A comprehensive web platform for secure browser tools..."
                    ></textarea>
                    <p class="text-[10px] text-gray-400">Keep descriptions under 160 characters for best visibility.</p>
                  </div>

                  <div class="space-y-1.5">
                    <label for="meta-keywords" class="text-xs font-bold uppercase text-gray-400">SEO Keywords (Comma Separated)</label>
                    <input 
                      type="text" 
                      id="meta-keywords" 
                      required
                      class="w-full bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-blue-500"
                      placeholder="e.g., converter, tools, background remover"
                    >
                  </div>
                </div>

                <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 space-y-5">
                  <div class="flex items-center justify-between pb-2 border-b border-gray-50 dark:border-zinc-800/60">
                    <div class="flex items-center gap-2">
                      <i data-lucide="file-code" class="w-5 h-5 text-emerald-500"></i>
                      <h3 class="font-bold text-sm">Sitemap XML Manager</h3>
                    </div>
                    <a href="/sitemap.xml" target="_blank" class="text-xs font-semibold text-blue-600 hover:underline flex items-center gap-1">
                      <span>View Live Sitemap</span>
                      <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                  </div>

                  <div class="space-y-1.5">
                    <label for="sitemap-xml" class="text-xs font-bold uppercase text-gray-400">Dynamic Sitemap Document</label>
                    <textarea 
                      id="sitemap-xml" 
                      required
                      rows="10"
                      class="w-full bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 rounded-xl py-3.5 px-4 text-xs font-mono text-gray-700 dark:text-zinc-300 focus:outline-none focus:border-blue-500"
                      placeholder="<?xml version='1.0' encoding='UTF-8'?>..."
                    ></textarea>
                  </div>
                </div>
              </div>

              <!-- Right Column: Robots.txt (1/3 width) -->
              <div class="space-y-6">
                <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 space-y-5">
                  <div class="flex items-center justify-between pb-2 border-b border-gray-50 dark:border-zinc-800/60">
                    <div class="flex items-center gap-2">
                      <i data-lucide="terminal" class="w-5 h-5 text-purple-500"></i>
                      <h3 class="font-bold text-sm">Robots Directives</h3>
                    </div>
                    <a href="/robots.txt" target="_blank" class="text-xs font-semibold text-blue-600 hover:underline flex items-center gap-1">
                      <span>View Live Robots.txt</span>
                      <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                  </div>

                  <div class="space-y-1.5">
                    <label for="robots-txt" class="text-xs font-bold uppercase text-gray-400">robots.txt Directives</label>
                    <textarea 
                      id="robots-txt" 
                      required
                      rows="10"
                      class="w-full bg-gray-50 dark:bg-zinc-950 border border-gray-200 dark:border-zinc-800 rounded-xl py-3.5 px-4 text-xs font-mono text-gray-700 dark:text-zinc-300 focus:outline-none focus:border-blue-500"
                      placeholder="User-agent: *..."
                    ></textarea>
                    <p class="text-[10px] text-gray-400">Use standard instructions to permit or limit crawl spiders from indexing directories.</p>
                  </div>
                </div>

                <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-6 space-y-4">
                  <h3 class="font-bold text-xs uppercase tracking-wider text-gray-400 flex items-center gap-2">
                    <i data-lucide="info" class="w-4 h-4 text-zinc-400"></i>
                    <span>Deployment Status</span>
                  </h3>
                  <div class="p-3.5 bg-gray-50 dark:bg-zinc-950 rounded-2xl border border-gray-100 dark:border-zinc-850 space-y-2">
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Sitemap Serving:</span>
                      <span class="text-emerald-500 font-bold flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Active
                      </span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                      <span class="text-gray-400">Robots Serving:</span>
                      <span class="text-emerald-500 font-bold flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Active
                      </span>
                    </div>
                  </div>
                  <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl text-sm shadow-lg shadow-blue-500/10 flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span>Apply SEO Configs</span>
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      `;

      // Fill in data
      document.getElementById("meta-title").value = seoSettings.metaTitle;
      document.getElementById("meta-description").value = seoSettings.metaDescription;
      document.getElementById("meta-keywords").value = seoSettings.keywords;
      document.getElementById("sitemap-xml").value = seoSettings.sitemapXml;
      document.getElementById("robots-txt").value = seoSettings.robotsTxt;

      // Form Submit binding
      document.getElementById("seo-form").addEventListener("submit", handleFormSubmit);

      lucide.createIcons();
    }

    async function handleFormSubmit(e) {
      e.preventDefault();

      const metaTitle = document.getElementById("meta-title").value;
      const metaDescription = document.getElementById("meta-description").value;
      const keywords = document.getElementById("meta-keywords").value;
      const sitemapXml = document.getElementById("sitemap-xml").value;
      const robotsTxt = document.getElementById("robots-txt").value;

      try {
        const res = await adminFetch("/api/admin/seo", {
          method: "POST",
          body: JSON.stringify({
            metaTitle,
            metaDescription,
            keywords,
            sitemapXml,
            robotsTxt
          })
        });

        if (res.ok) {
          showToast("SEO & Indexing instructions deployed successfully.");
          loadSeo();
        } else {
          showToast("Failed to deploy SEO configs.", "error");
        }
      } catch (err) {
        showToast("Error processing request.", "error");
      }
    }

    // Initial load
    loadSeo();
  </script>
</body>
</html>
