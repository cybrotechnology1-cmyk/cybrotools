<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybro Admin - Media Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 font-sans antialiased">
  <div id="admin-layout-container" class="flex flex-col md:flex-row min-h-screen">
    <!-- Sidebar dynamically injected here -->
  </div>

  <script type="module">
    import { renderSidebar, adminFetch, showToast } from "./admin.js";

    renderSidebar("media");

    const mainStage = document.getElementById("admin-main-stage");
    let mediaItems = [];

    async function loadMedia() {
      mainStage.innerHTML = `<div class="h-96 flex items-center justify-center text-gray-400 animate-pulse text-sm">Querying media repository...</div>`;
      try {
        const res = await adminFetch("/api/admin/media");
        mediaItems = await res.json();
        renderLayout();
      } catch (err) {
        showToast("Failed to fetch media assets.", "error");
        mainStage.innerHTML = `<div class="p-6 bg-red-950/40 text-red-400 rounded-2xl">Could not retrieve assets. Ensure session authorization.</div>`;
      }
    }

    function renderLayout() {
      mainStage.innerHTML = `
        <div class="space-y-8 animate-in fade-in duration-300">
          <div class="flex items-center justify-between flex-wrap gap-4">
            <div>
              <h2 class="text-xl font-bold tracking-tight">Media Library</h2>
              <p class="text-xs text-gray-500 dark:text-zinc-400 mt-1">Upload and manage images or assets to embed in articles and features.</p>
            </div>
          </div>

          <!-- Drag & Drop Upload Zone -->
          <div 
            id="dropzone" 
            class="border-2 border-dashed border-gray-200 dark:border-zinc-800 hover:border-blue-500 dark:hover:border-blue-500 bg-white dark:bg-zinc-900 rounded-3xl p-8 text-center cursor-pointer transition-all space-y-4 group"
          >
            <input type="file" id="file-input" class="hidden" accept="image/*,application/pdf">
            <div class="w-12 h-12 bg-zinc-50 dark:bg-zinc-950 rounded-full flex items-center justify-center text-gray-400 mx-auto group-hover:scale-105 group-hover:text-blue-500 transition-all">
              <i data-lucide="upload" class="w-6 h-6"></i>
            </div>
            <div class="space-y-1">
              <h3 class="font-bold text-sm">Drag & drop your files here, or <span class="text-blue-600 hover:underline">browse</span></h3>
              <p class="text-xs text-gray-400">Supports PNG, JPG, JPEG, SVG, WebP up to 10MB</p>
            </div>
          </div>

          <!-- Upload Status Indicator -->
          <div id="upload-status" class="p-4 bg-blue-50 dark:bg-zinc-900 border border-blue-200 dark:border-zinc-800 rounded-2xl hidden flex items-center gap-3">
            <div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-600 border-t-transparent flex-shrink-0"></div>
            <p class="text-xs font-semibold text-blue-800 dark:text-blue-400" id="upload-status-text">Processing file upload...</p>
          </div>

          <!-- Media Assets Grid -->
          <div class="space-y-4">
            <div class="flex items-center justify-between">
              <h3 class="font-bold text-sm">Assets Vault (${mediaItems.length})</h3>
            </div>

            ${mediaItems.length === 0 ? `
              <div class="text-center py-16 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl text-gray-400 text-sm">
                No assets uploaded yet. Try dropping a file inside the container above.
              </div>
            ` : `
              <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                ${mediaItems.map(item => {
                  const isImage = item.type.startsWith("image/");
                  return `
                    <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-3xl p-4 flex flex-col justify-between group relative overflow-hidden shadow-sm">
                      <div class="space-y-3">
                        <!-- Preview Thumbnail -->
                        <div class="aspect-square bg-gray-50 dark:bg-zinc-950 rounded-2xl overflow-hidden relative border border-gray-100 dark:border-zinc-800/80 flex items-center justify-center">
                          ${isImage ? `
                            <img src="${item.url}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                          ` : `
                            <i data-lucide="file-text" class="w-10 h-10 text-gray-400"></i>
                          `}
                        </div>

                        <!-- Details -->
                        <div class="space-y-1">
                          <h4 class="font-bold text-xs truncate text-gray-900 dark:text-white" title="${item.name}">${item.name}</h4>
                          <p class="text-[10px] text-gray-400 flex items-center justify-between">
                            <span>${item.size}</span>
                            <span>${new Date(item.uploadedAt).toLocaleDateString()}</span>
                          </p>
                        </div>
                      </div>

                      <!-- Hover Actions -->
                      <div class="mt-3.5 flex items-center gap-2">
                        <button 
                          data-url="${item.url}" 
                          class="copy-btn flex-1 py-1.5 border border-gray-200 dark:border-zinc-800 rounded-xl text-[10px] font-bold text-gray-600 dark:text-zinc-400 hover:bg-gray-100 dark:hover:bg-zinc-850 flex items-center justify-center gap-1"
                        >
                          <i data-lucide="copy" class="w-3 h-3"></i>
                          <span>Copy Link</span>
                        </button>
                        <button 
                          data-id="${item.id}" 
                          class="delete-btn p-1.5 border border-gray-200 dark:border-zinc-800 rounded-xl hover:bg-red-50 dark:hover:bg-red-950/30 text-gray-400 hover:text-red-500"
                          title="Delete Asset"
                        >
                          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            `}
          </div>
        </div>
      `;

      // Bind events
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");

      dropzone.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          uploadFile(e.target.files[0]);
        }
      });

      // Drag and drop listeners
      ["dragenter", "dragover"].forEach(eventName => {
        dropzone.addEventListener(eventName, (e) => {
          e.preventDefault();
          dropzone.classList.add("border-blue-500", "bg-blue-50/10");
        }, false);
      });

      ["dragleave", "drop"].forEach(eventName => {
        dropzone.addEventListener(eventName, (e) => {
          e.preventDefault();
          dropzone.classList.remove("border-blue-500", "bg-blue-50/10");
        }, false);
      });

      dropzone.addEventListener("drop", (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
          uploadFile(files[0]);
        }
      });

      // Action buttons
      document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const relativeUrl = e.currentTarget.dataset.url;
          // Construct absolute URL
          const absoluteUrl = window.location.origin + relativeUrl;
          navigator.clipboard.writeText(absoluteUrl).then(() => {
            showToast("Asset URL copied to clipboard.");
          }).catch(() => {
            showToast("Failed to copy URL.", "error");
          });
        });
      });

      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const id = e.currentTarget.dataset.id;
          deleteAsset(id);
        });
      });

      lucide.createIcons();
    }

    function formatBytes(bytes, decimals = 1) {
      if (bytes === 0) return "0 Bytes";
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ["Bytes", "KB", "MB", "GB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + " " + sizes[i];
    }

    async function uploadFile(file) {
      if (file.size > 10 * 1024 * 1024) {
        showToast("Files must be under 10MB.", "error");
        return;
      }

      const statusDiv = document.getElementById("upload-status");
      const statusText = document.getElementById("upload-status-text");

      statusDiv.classList.remove("hidden");
      statusText.textContent = `Uploading: ${file.name} (${formatBytes(file.size)})...`;

      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async () => {
        const base64Data = reader.result;

        try {
          const res = await adminFetch("/api/admin/media", {
            method: "POST",
            body: JSON.stringify({
              name: file.name,
              type: file.type,
              size: formatBytes(file.size),
              data: base64Data
            })
          });

          statusDiv.classList.add("hidden");

          if (res.ok) {
            showToast("Asset uploaded successfully.");
            loadMedia();
          } else {
            const data = await res.json();
            showToast(data.error || "Failed to upload asset.", "error");
          }
        } catch (err) {
          statusDiv.classList.add("hidden");
          showToast("Network upload error.", "error");
        }
      };
      
      reader.onerror = () => {
        statusDiv.classList.add("hidden");
        showToast("Failed to read file.", "error");
      };
    }

    async function deleteAsset(id) {
      if (!confirm("Are you sure you want to delete this media asset permanently? This cannot be undone and may cause broken image links if currently embedded inside blogs.")) return;

      try {
        const res = await adminFetch(`/api/admin/media?id=${id}`, {
          method: "DELETE"
        });

        if (res.ok) {
          showToast("Asset removed successfully.");
          loadMedia();
        } else {
          showToast("Failed to delete asset.", "error");
        }
      } catch (err) {
        showToast("Network error deleting asset.", "error");
      }
    }

    // Initial load
    loadMedia();
  </script>
</body>
</html>
